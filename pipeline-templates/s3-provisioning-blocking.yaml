template: 
 name: s3-provisioning-blocking 
 identifier: s3provisioningblocking 
 versionLabel: v1 
 type: Pipeline 
 tags: {} 
 description: S3 bucket provisioning with Teams approval and blocking governance 
 spec: 
   variables: 
     - name: bucket_name 
       type: String 
       description: Name of the S3 bucket (must be globally unique) 
       required: true 
       value: <+input> 
     - name: aws_region 
       type: String 
       description: AWS region to create the bucket in 
       required: true 
       value: <+input>.allowedValues(us-east-1,us-west-2,eu-west-1,ap-south-1).default(us-east-1) 
     - name: bucket_visibility 
       type: String 
       description: Block public access? 
       required: false 
       value: <+input>.allowedValues(private,public).default(private) 
     - name: github_repo 
       type: String 
       description: GitHub repo in format username/reponame 
       required: true 
       value: <+input> 
     - name: teams_webhook 
       type: String 
       description: Microsoft Teams incoming webhook URL secret name 
       required: true 
       value: <+input> 
   stages: 
     - stage: 
         name: Validate Inputs 
         identifier: validate_inputs 
         type: CI 
         spec: 
           cloneCodebase: false 
           platform: 
             os: Linux 
             arch: Amd64 
           runtime: 
             type: Cloud 
             spec: {} 
           execution: 
             steps: 
               - step: 
                   name: Policy Blocking Check 
                   identifier: policy_blocking_check 
                   template: 
                     templateRef: s3policyblocking 
                     versionLabel: v1 
                     templateInputs: 
                       type: Run 
                       spec: 
                         envVariables: 
                           BUCKET_NAME: <+pipeline.variables.bucket_name> 
                           AWS_REGION: <+pipeline.variables.aws_region> 
                           BUCKET_VISIBILITY: <+pipeline.variables.bucket_visibility> 
                           TEAMS_WEBHOOK_URL: <+secrets.getValue(<+pipeline.variables.teams_webhook>)> 
                           POLICY_MODE: BLOCKING 
 
     - stage: 
         name: Request Approval 
         identifier: request_approval 
         type: CI 
         spec: 
           cloneCodebase: false 
           platform: 
             os: Linux 
             arch: Amd64 
           runtime: 
             type: Cloud 
             spec: {} 
           execution: 
             steps: 
               - step: 
                   type: Run 
                   name: Send Teams Approval Card 
                   identifier: send_teams_card 
                   spec: 
                     shell: Bash 
                     envVariables: 
                       TEAMS_WEBHOOK: <+secrets.getValue(<+pipeline.variables.teams_webhook>)> 
                       BUCKET_NAME: <+pipeline.variables.bucket_name> 
                       AWS_REGION: <+pipeline.variables.aws_region> 
                       VISIBILITY: <+pipeline.variables.bucket_visibility> 
                       TRIGGERED_BY: <+pipeline.triggeredBy.name> 
                     command: |- 
                       python3 << 'PYEOF' 
                       import json, urllib.request, os, sys 
 
                       webhook      = os.environ['TEAMS_WEBHOOK'] 
                       bucket       = os.environ['BUCKET_NAME'] 
                       region       = os.environ['AWS_REGION'] 
                       visibility   = os.environ['VISIBILITY'] 
                       triggered_by = os.environ['TRIGGERED_BY'] 
 
                       payload = { 
                           "@type": "MessageCard", 
                           "@context": "http://schema.org/extensions", 
                           "themeColor": "0076D7", 
                           "summary": "S3 Bucket Provisioning Approval Required", 
                           "sections": [{ 
                               "activityTitle": "S3 Bucket Provisioning Request", 
                               "activitySubtitle": "Policy checks passed - please approve or reject in Harness", 
                               "facts": [ 
                                   {"name": "Bucket Name",  "value": bucket}, 
                                   {"name": "AWS Region",   "value": region}, 
                                   {"name": "Visibility",   "value": visibility}, 
                                   {"name": "Triggered By", "value": triggered_by}, 
                                   {"name": "Policy Mode",  "value": "BLOCKING"}, 
                                   {"name": "Status",       "value": "Waiting for Approval"} 
                               ], 
                               "markdown": True 
                           }] 
                       } 
 
                       data = json.dumps(payload).encode("utf-8") 
                       req  = urllib.request.Request( 
                           webhook, data=data, 
                           headers={"Content-Type": "application/json", "Content-Length": str(len(data))} 
                       ) 
                       try: 
                           resp = urllib.request.urlopen(req) 
                           print("Teams approval card sent! Status:", resp.status) 
                       except Exception as e: 
                           print("Warning: Teams notification failed:", str(e)) 
                           sys.exit(0) 
                       PYEOF 
 
     - stage: 
         name: Harness Approval 
         identifier: harness_approval 
         type: Approval 
         spec: 
           execution: 
             steps: 
               - step: 
                   type: HarnessApproval 
                   name: Approve S3 Provisioning 
                   identifier: approve_s3 
                   spec: 
                     approvalMessage: |- 
                       Please review and approve the S3 bucket provisioning: 
                       - Bucket Name: <+pipeline.variables.bucket_name> 
                       - Region: <+pipeline.variables.aws_region> 
                       - Visibility: <+pipeline.variables.bucket_visibility> 
                       - Policy Mode: BLOCKING 
                     includePipelineExecutionHistory: true 
                     approvers: 
                       userGroups: 
                         - _project_all_users 
                       minimumCount: 1 
                       disallowPipelineExecutor: false 
                     approverInputs: [] 
                     isAutoRejectEnabled: false 
                   timeout: 1d 
 
     - stage: 
         name: Provision S3 Bucket 
         identifier: provision_s3 
         type: CI 
         spec: 
           cloneCodebase: false 
           platform: 
             os: Linux 
             arch: Amd64 
           runtime: 
             type: Cloud 
             spec: {} 
           execution: 
             steps: 
               - step: 
                   type: Run 
                   name: Trigger and Wait for GitHub Action 
                   identifier: trigger_and_wait_github_action 
                   timeout: 30m 
                   spec: 
                     shell: Bash 
                     envVariables: 
                       GITHUB_PAT: <+secrets.getValue("github_pat")> 
                       TEAMS_WEBHOOK: <+secrets.getValue(<+pipeline.variables.teams_webhook>)> 
                       BUCKET_NAME: <+pipeline.variables.bucket_name> 
                       AWS_REGION: <+pipeline.variables.aws_region> 
                       VISIBILITY: <+pipeline.variables.bucket_visibility> 
                       GITHUB_REPO: <+pipeline.variables.github_repo> 
                     command: |- 
                       WORKFLOW="create-s3-bucket.yml" 
 
                       echo "Triggering GitHub Action..." 
                       HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Authorization: token $GITHUB_PAT" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$GITHUB_REPO/actions/workflows/$WORKFLOW/dispatches" -d "{\"ref\":\"main\",\"inputs\":{\"bucket_name\":\"$BUCKET_NAME\",\"aws_region\":\"$AWS_REGION\",\"bucket_visibility\":\"$VISIBILITY\"}}") 
 
                       echo "GitHub API response: $HTTP_CODE" 
 
                       if [ "$HTTP_CODE" != "204" ]; then 
                         echo "Failed to trigger GitHub Action. HTTP: $HTTP_CODE" 
                         python3 -c "import json,urllib.request,os; w=os.environ['TEAMS_WEBHOOK']; p={'@type':'MessageCard','@context':'http://schema.org/extensions','themeColor':'FF0000','sections':[{'activityTitle':'S3 Provisioning Failed','activitySubtitle':'Could not trigger GitHub Actions','facts':[{'name':'Bucket','value':os.environ['BUCKET_NAME']},{'name':'Reason','value':'GitHub API returned HTTP $HTTP_CODE'}]}]}; d=json.dumps(p).encode('utf-8'); r=urllib.request.Request(w,data=d,headers={'Content-Type':'application/json','Content-Length':str(len(d))}); urllib.request.urlopen(r)" 
                         exit 1 
                       fi 
 
                       echo "GitHub Action triggered! Waiting for run to appear..." 
                       sleep 10 
 
                       RUN_ID="" 
                       for i in $(seq 1 12); do 
                         RUN_ID=$(curl -s -H "Authorization: token $GITHUB_PAT" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$GITHUB_REPO/actions/workflows/$WORKFLOW/runs?per_page=5" | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); [print(r['id']) for r in runs if r['status'] in ['queued','in_progress','waiting']]" 2>/dev/null | head -1) 
                         if [ -n "$RUN_ID" ]; then 
                           echo "Found Run ID: $RUN_ID" 
                           break 
                         fi 
                         echo "Attempt $i/12 - waiting..." 
                         sleep 5 
                       done 
 
                       if [ -z "$RUN_ID" ]; then 
                         echo "Could not find GitHub Actions Run ID" 
                         python3 -c "import json,urllib.request,os; w=os.environ['TEAMS_WEBHOOK']; p={'@type':'MessageCard','@context':'http://schema.org/extensions','themeColor':'FF0000','sections':[{'activityTitle':'S3 Provisioning Failed','activitySubtitle':'Run ID not found','facts':[{'name':'Bucket','value':os.environ['BUCKET_NAME']},{'name':'Reason','value':'Run did not appear after trigger'}]}]}; d=json.dumps(p).encode('utf-8'); r=urllib.request.Request(w,data=d,headers={'Content-Type':'application/json','Content-Length':str(len(d))}); urllib.request.urlopen(r)" 
                         exit 1 
                       fi 
 
                       echo "Polling GitHub Actions run status..." 
                       CONCLUSION="" 
                       for i in $(seq 1 30); do 
                         RESULT=$(curl -s -H "Authorization: token $GITHUB_PAT" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$GITHUB_REPO/actions/runs/$RUN_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown')+'|'+(d.get('conclusion') or ''))") 
                         STATUS=$(echo $RESULT | cut -d'|' -f1) 
                         CONCLUSION=$(echo $RESULT | cut -d'|' -f2) 
                         echo "Poll $i/30 - Status: $STATUS | Conclusion: $CONCLUSION" 
                         if [ "$STATUS" = "completed" ]; then 
                           echo "GitHub Actions run completed!" 
                           break 
                         fi 
                         sleep 30 
                       done 
 
                       LOGS_URL="https://github.com/$GITHUB_REPO/actions/runs/$RUN_ID" 
 
                       if [ "$CONCLUSION" = "success" ]; then 
                         echo "S3 bucket $BUCKET_NAME created successfully!" 
                         python3 -c "import json,urllib.request,os; w=os.environ['TEAMS_WEBHOOK']; b=os.environ['BUCKET_NAME']; reg=os.environ['AWS_REGION']; vis=os.environ['VISIBILITY']; logs='$LOGS_URL'; p={'@type':'MessageCard','@context':'http://schema.org/extensions','themeColor':'00C851','summary':'S3 Bucket Created','sections':[{'activityTitle':'S3 Bucket Provisioned Successfully!','activitySubtitle':'Harness pipeline completed via GitHub Actions','facts':[{'name':'Bucket Name','value':b},{'name':'AWS Region','value':reg},{'name':'Visibility','value':vis},{'name':'GitHub Logs','value':logs},{'name':'Status','value':'Successfully Created'}]}]}; d=json.dumps(p).encode('utf-8'); r=urllib.request.Request(w,data=d,headers={'Content-Type':'application/json','Content-Length':str(len(d))}); urllib.request.urlopen(r); print('Teams success notification sent!')" 
                         exit 0 
                       else 
                         echo "GitHub Actions failed! Conclusion: $CONCLUSION" 
                         python3 -c "import json,urllib.request,os; w=os.environ['TEAMS_WEBHOOK']; b=os.environ['BUCKET_NAME']; reg=os.environ['AWS_REGION']; logs='$LOGS_URL'; conc='$CONCLUSION'; p={'@type':'MessageCard','@context':'http://schema.org/extensions','themeColor':'FF0000','summary':'S3 Bucket Failed','sections':[{'activityTitle':'S3 Bucket Provisioning Failed!','activitySubtitle':'GitHub Actions workflow failed','facts':[{'name':'Bucket Name','value':b},{'name':'AWS Region','value':reg},{'name':'Failure','value':conc},{'name':'View Logs','value':logs},{'name':'Status','value':'Failed'}]}]}; d=json.dumps(p).encode('utf-8'); r=urllib.request.Request(w,data=d,headers={'Content-Type':'application/json','Content-Length':str(len(d))}); urllib.request.urlopen(r); print('Teams failure notification sent!')" 
                         exit 1 
                       fi 
