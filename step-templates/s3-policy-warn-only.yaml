template:
  name: s3-policy-warn-only
  identifier: s3policywarnonly
  versionLabel: v1
  type: Step
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  description: Warn only governance checks for S3 bucket provisioning
  spec:
    type: Run
    spec:
      shell: Bash
      command: |-

        echo "============================================" 

        echo "POLICY CHECK - WARN ONLY MODE v1" 

        echo "============================================" 



        BUCKET_NAME="<+pipeline.variables.bucket_name>" 

        VISIBILITY="<+pipeline.variables.bucket_visibility>" 

        WARNINGS=0 



        # Rule 1: Bucket name must be lowercase 

        LOWER=$(echo "$BUCKET_NAME" | tr '[:upper:]' '[:lower:]') 

        if [ "$BUCKET_NAME" != "$LOWER" ]; then 

          echo "WARN: Bucket name '$BUCKET_NAME' must be all lowercase" 

          WARNINGS=$((WARNINGS + 1)) 

        fi 



        # Rule 2: Bucket name minimum 5 characters 

        NAME_LENGTH=${#BUCKET_NAME} 

        if [ "$NAME_LENGTH" -lt 5 ]; then 

          echo "WARN: Bucket name too short (min 5 chars, got $NAME_LENGTH)" 

          WARNINGS=$((WARNINGS + 1)) 

        fi 



        # Rule 3: No underscores or spaces 

        if echo "$BUCKET_NAME" | grep -qE '[_ ]'; then 

          echo "WARN: Bucket name contains underscores or spaces - use hyphens instead" 

          WARNINGS=$((WARNINGS + 1)) 

        fi 



        # Rule 4: Must have environment prefix 

        if ! echo "$BUCKET_NAME" | grep -qE '^(dev|staging|prod|test)'; then 

          echo "WARN: Bucket name missing environment prefix (dev/staging/prod/test)" 

          WARNINGS=$((WARNINGS + 1)) 

        fi 



        # Rule 5: Visibility should be private 

        if [ "$VISIBILITY" = "public" ]; then 

          echo "WARN: Bucket visibility is PUBLIC - private is strongly recommended" 

          WARNINGS=$((WARNINGS + 1)) 

        fi 



        echo "--------------------------------------------" 

        if [ "$WARNINGS" -eq 0 ]; then 

          echo "All policy checks passed - no warnings!" 

        else 

          echo "Policy check: $WARNINGS warning(s) found - pipeline continues (WARN ONLY)" 

        fi 

        echo "============================================" 

        exit 0 
